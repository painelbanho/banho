<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Banho</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#f5f6f8;--bg2:#ffffff;--bg3:#f0f2f5;--bg4:#e8ebef;
  --border:#e3e6ea;--border2:#d0d5dd;
  --text:#111827;--text2:#374151;--text3:#9ca3af;
  --accent:#2563eb;--accent2:#1d4ed8;
  --green:#059669;--amber:#d97706;--red:#dc2626;--purple:#7c3aed;--teal:#0d9488;--orange:#ea580c;
  --radius:10px;--radius-lg:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg3)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}

.header{padding:20px 24px 0;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);padding-bottom:0}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:34px;height:34px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;color:#fff}
.logo-text{font-size:16px;font-weight:600;letter-spacing:-.3px}
.logo-sub{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;margin-top:1px}
.header-date{font-size:12px;color:var(--text3);font-family:'DM Mono',monospace;text-align:right}

.tab-bar{display:flex;gap:0;padding:0 24px;border-bottom:1px solid var(--border);overflow-x:auto}
.tab{padding:14px 16px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:none;color:var(--text3);border-bottom:2px solid transparent;margin-bottom:-1px;display:flex;align-items:center;gap:7px;transition:color .15s;white-space:nowrap;flex-shrink:0}
.tab:hover{color:var(--text2)}
.tab.active{color:var(--text);border-bottom:2px solid var(--accent)}
.tab i{font-size:15px}

.main{padding:24px}
.section{display:none}.section.active{display:block}

.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px}
.card+.card{margin-top:14px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.card-title{font-size:14px;font-weight:500;display:flex;align-items:center;gap:8px;color:var(--text)}
.card-title i{font-size:16px;color:var(--accent)}

.btn{font-size:13px;padding:7px 14px;border-radius:8px;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;font-weight:500;display:inline-flex;align-items:center;gap:6px;transition:all .15s;border:1px solid var(--border2);background:var(--bg3);color:var(--text2)}
.btn:hover{background:var(--bg4);color:var(--text)}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2);border-color:var(--accent2)}
.btn-ghost{background:none;border-color:transparent;color:var(--text3);padding:5px 8px}
.btn-ghost:hover{color:var(--red);background:rgba(220,38,38,.08)}
.btn-edit{background:none;border-color:transparent;color:var(--text3);padding:5px 8px}
.btn-edit:hover{color:var(--accent);background:rgba(37,99,235,.1)}
.btn-sm{font-size:12px;padding:5px 10px}
.btn-orange{background:rgba(234,88,12,.1);border-color:rgba(234,88,12,.25);color:var(--orange)}
.btn-orange:hover{background:rgba(234,88,12,.18)}

input,select,textarea{font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;color:var(--text);padding:8px 11px;outline:none;width:100%;transition:border .15s}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
input::placeholder,textarea::placeholder{color:var(--text3)}
select option{background:var(--bg3)}
textarea{resize:vertical;min-height:60px}

.badge{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500;font-family:'DM Mono',monospace}
.badge-banho{background:rgba(37,99,235,.12);color:#1d4ed8}
.badge-processo{background:rgba(124,58,237,.12);color:#6d28d9}
.badge-ok{background:rgba(5,150,105,.12);color:#047857}
.badge-med{background:rgba(217,119,6,.12);color:#b45309}
.badge-low{background:rgba(220,38,38,.12);color:#b91c1c}

.toolbar{display:flex;justify-content:flex-end;margin-bottom:16px;gap:8px;flex-wrap:wrap}

.tarefa-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px}
.check-item{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border)}
.check-item:last-of-type{border-bottom:none}
.check-item input[type=checkbox]{width:16px;height:16px;cursor:pointer;accent-color:var(--accent);flex-shrink:0}
.check-item label{font-size:13px;cursor:pointer;flex:1;color:var(--text2)}
.check-item label.done-label{text-decoration:line-through;color:var(--text3)}
.pill{font-size:11px;padding:3px 10px;border-radius:20px;font-family:'DM Mono',monospace;background:var(--bg4);color:var(--text3)}
.pill.done{background:rgba(5,150,105,.12);color:var(--green)}
.add-row{display:flex;gap:8px;margin-top:14px}
.add-row input{flex:1}
.add-row .btn{flex-shrink:0}
.empty-msg{font-size:12px;color:var(--text3);padding:16px 0;text-align:center}

/* EDIT IN-PLACE */
.edit-row{display:none;gap:6px;align-items:center;margin-top:6px}
.edit-row.open{display:flex}
.edit-row input,.edit-row textarea{flex:1;font-size:12px;padding:5px 8px}

/* INLINE FORM */
.inline-form{background:var(--bg4);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-top:12px;display:none}
.inline-form.open{display:block}
.form-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.form-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px}
.form-grid-4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px;margin-bottom:12px}
.form-grid-5{display:grid;grid-template-columns:2fr 1fr 1.5fr 1fr 1fr;gap:10px;margin-bottom:12px}
.form-group>label{display:block;font-size:10px;font-weight:500;color:var(--text3);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px;font-family:'DM Mono',monospace}
.form-btns{display:flex;gap:8px;flex-wrap:wrap}

/* TANQUES */
.tanque-layout{display:grid;grid-template-columns:240px 1fr;gap:16px;align-items:start}
.sidebar{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;position:sticky;top:16px}
.sidebar-header{padding:12px 16px;border-bottom:1px solid var(--border);font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;font-family:'DM Mono',monospace}
.tanque-row{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s}
.tanque-row:last-child{border-bottom:none}
.tanque-row:hover{background:var(--bg3)}
.tanque-row.active{background:rgba(37,99,235,.08);border-left:2px solid var(--accent)}
.tanque-nome{font-size:13px;font-weight:500;color:var(--text)}
.tanque-tipo-label{font-size:11px;color:var(--text3);margin-top:2px;font-family:'DM Mono',monospace}

/* INNER TABS */
.inner-tabs{display:flex;gap:0;border-bottom:1px solid var(--border)}
.inner-tab{padding:10px 16px;font-size:12px;font-weight:500;cursor:pointer;border:none;background:none;color:var(--text3);border-bottom:2px solid transparent;margin-bottom:-1px;display:flex;align-items:center;gap:6px;transition:color .15s}
.inner-tab:hover{color:var(--text2)}
.inner-tab.active{color:var(--text);border-bottom:2px solid var(--accent)}
.inner-section{display:none;padding:20px}
.inner-section.active{display:block}

/* TABELAS */
.comp-table-wrap{overflow-x:auto}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:left;padding:9px 12px;font-size:10px;font-weight:500;color:var(--text3);border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.5px;font-family:'DM Mono',monospace;white-space:nowrap}
.tbl td{padding:9px 12px;border-bottom:1px solid var(--border);color:var(--text2);vertical-align:top}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:rgba(255,255,255,.02)}
.tbl td.bold{font-weight:500;color:var(--text)}
.tbl td.accent{color:var(--accent);font-family:'DM Mono',monospace;font-size:12px}
.tbl td.green{color:var(--green);font-family:'DM Mono',monospace;font-size:12px}
.tbl td.func-col{font-size:12px;color:var(--text2);max-width:220px;line-height:1.5}
.tbl td.act-col{white-space:nowrap;width:80px}
.act-btns{display:flex;gap:2px}

/* PARAM */
.param-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:16px}
.param-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:14px}
.param-label{font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px;font-family:'DM Mono',monospace}

/* LOG */
.log-wrap{max-height:320px;overflow-y:auto}
.log-entry{display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);font-size:12px}
.log-entry:last-child{border-bottom:none}
.log-time{color:var(--text3);white-space:nowrap;font-family:'DM Mono',monospace;font-size:11px;min-width:110px;padding-top:2px}
.log-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:4px}
.dot-rep{background:var(--purple)}.dot-troca{background:var(--orange)}.dot-filtragem{background:var(--teal)}
.log-text{color:var(--text2);flex:1;line-height:1.4}
.log-tag{display:inline-block;font-size:10px;padding:1px 7px;border-radius:20px;font-family:'DM Mono',monospace;margin-right:4px;vertical-align:middle}
.log-tag-rep{background:rgba(124,58,237,.12);color:#6d28d9}
.log-tag-troca{background:rgba(234,88,12,.12);color:#c2410c}
.log-tag-filtragem{background:rgba(13,148,136,.12);color:#0f766e}

.repos-tipo-btns{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.tipo-btn{padding:7px 14px;border-radius:8px;cursor:pointer;border:1px solid var(--border2);background:var(--bg3);color:var(--text3);font-size:13px;font-weight:500;font-family:'Plus Jakarta Sans',sans-serif;transition:all .15s}
.tipo-btn.sel-rep{border-color:var(--purple);background:rgba(124,58,237,.1);color:#6d28d9}
.tipo-btn.sel-troca{border-color:var(--orange);background:rgba(234,88,12,.1);color:#c2410c}
.tipo-btn.sel-filt{border-color:var(--teal);background:rgba(13,148,136,.1);color:#0f766e}

/* MONTAGEM */
.montagem-step{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.montagem-step:last-child{border-bottom:none}
.step-num{width:22px;height:22px;border-radius:50%;background:var(--accent);color:#fff;font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;font-family:'DM Mono',monospace}
.step-text{font-size:13px;color:var(--text2);flex:1;line-height:1.5}

/* PROCESSOS */
.proc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
.proc-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
.proc-card-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.proc-card-title{font-size:14px;font-weight:500;color:var(--text)}
.proc-card-body{padding:14px 18px}
.metodo-item{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.metodo-item:last-child{border-bottom:none}
.metodo-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);flex-shrink:0;margin-top:5px}
.metodo-info{flex:1;min-width:0}
.metodo-nome{font-size:13px;color:var(--text2);font-weight:500}
.metodo-desc{font-size:12px;color:var(--text3);margin-top:2px;line-height:1.4}

/* ESTOQUE */
.stock-controls{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.stock-controls select{width:auto}
.qty-cell{display:flex;align-items:center;gap:6px}
.qty-btn{width:26px;height:26px;border:1px solid var(--border2);border-radius:6px;background:var(--bg3);cursor:pointer;font-size:14px;display:inline-flex;align-items:center;justify-content:center;color:var(--text2);transition:all .12s}
.qty-btn:hover{background:var(--bg4);color:var(--text)}
.nivel-bar{width:60px;height:5px;background:var(--bg4);border-radius:3px;overflow:hidden;display:inline-block;vertical-align:middle}
.nivel-fill{height:100%;border-radius:3px}
.nok{background:var(--green)}.nmed{background:var(--amber)}.nlow{background:var(--red)}

.add-form{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;margin-bottom:16px;display:none}
.add-form.open{display:block}

/* CALENDÁRIO */
.cal-layout{display:grid;grid-template-columns:1fr 340px;gap:16px;align-items:start}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.cal-nav{display:flex;align-items:center;gap:12px}
.cal-title{font-size:15px;font-weight:600;color:var(--text)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-dow{text-align:center;font-size:10px;font-weight:500;color:var(--text3);font-family:'DM Mono',monospace;padding:6px 0;text-transform:uppercase}
.cal-day{min-height:72px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:6px;cursor:pointer;transition:border-color .12s;position:relative}
.cal-day:hover{border-color:var(--border2)}
.cal-day.today{border-color:var(--accent);background:rgba(37,99,235,.05)}
.cal-day.other-month .cal-day-num{color:var(--text3)}
.cal-day-num{font-size:12px;font-weight:500;color:var(--text2);margin-bottom:3px;font-family:'DM Mono',monospace}
.cal-day.today .cal-day-num{color:var(--accent);font-weight:700}
.cal-event{font-size:10px;padding:2px 5px;border-radius:4px;margin-bottom:2px;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer}
.cal-event-manual{background:rgba(37,99,235,.15);color:#1e40af}
.cal-event-hist{background:rgba(124,58,237,.12);color:#5b21b6}
.cal-event-venc{background:rgba(220,38,38,.15);color:#991b1b}
.cal-event-agenda{background:rgba(5,150,105,.12);color:#065f46}
.cal-side{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
.cal-side-header{padding:14px 16px;border-bottom:1px solid var(--border);font-size:13px;font-weight:500;color:var(--text)}
.cal-side-body{padding:16px;max-height:560px;overflow-y:auto}
.ev-item{padding:10px 12px;border-radius:var(--radius);margin-bottom:8px;border-left:3px solid}
.ev-item-manual{background:rgba(37,99,235,.06);border-color:var(--accent)}
.ev-item-venc{background:rgba(220,38,38,.06);border-color:var(--red)}
.ev-item-agenda{background:rgba(5,150,105,.06);border-color:var(--green)}
.ev-title{font-size:13px;font-weight:500;color:var(--text)}
.ev-sub{font-size:11px;color:var(--text3);margin-top:3px;font-family:'DM Mono',monospace}
.ev-desc{font-size:12px;color:var(--text2);margin-top:4px;line-height:1.4}
.venc-badge{display:inline-block;font-size:10px;padding:1px 7px;border-radius:20px;font-family:'DM Mono',monospace;background:rgba(220,38,38,.12);color:#b91c1c;margin-left:6px}
.venc-badge.ok{background:rgba(5,150,105,.12);color:#047857}
.venc-badge.warn{background:rgba(217,119,6,.12);color:#b45309}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:100;display:none;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border);box-shadow:0 20px 60px rgba(0,0,0,.12);border-radius:var(--radius-lg);padding:24px;width:440px;max-width:96vw}
.modal-title{font-size:15px;font-weight:600;color:var(--text);margin-bottom:18px}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}

@media(max-width:900px){.cal-layout{grid-template-columns:1fr}}
@media(max-width:700px){
  /* Layout geral */
  .main{padding:10px}
  .header{padding:12px 14px}
  .logo-text{font-size:16px}
  .header-date{font-size:11px}
  /* Tab bar compacto */
  .tab-bar{gap:0;padding:0 4px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;flex-wrap:nowrap}
  .tab-bar::-webkit-scrollbar{display:none}
  .tab span{font-size:11px}
  .tab{padding:12px 10px;white-space:nowrap;flex-shrink:0}
  /* Tanques: sidebar vira lista horizontal rolável no topo */
  .tanque-layout{grid-template-columns:1fr;gap:10px}
  .sidebar{position:static!important;border-radius:var(--radius);overflow:hidden}
  #tanque-list{display:flex;flex-direction:row;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  #tanque-list::-webkit-scrollbar{display:none}
  .sidebar-header{display:none}
  .tanque-row{flex-direction:column;align-items:flex-start;flex-shrink:0;padding:8px 14px;border-bottom:none;border-right:1px solid var(--border);min-width:0;max-width:140px;gap:0}
  .tanque-row .ti-icon{display:none}
  .tanque-nome{font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:120px}
  .tanque-row.active{border-left:none;border-bottom:2px solid var(--accent)}
  /* Forms */
  .form-grid-5{grid-template-columns:1fr 1fr}
  .form-grid-4{grid-template-columns:1fr 1fr}
  .form-grid-3{grid-template-columns:1fr 1fr}
  .form-grid-2{grid-template-columns:1fr}
  /* Inner tabs */
  .inner-tab span{display:none}
  .inner-tab{padding:10px 12px}
  /* Cards */
  .card{padding:14px}
  /* Calendar */
  .cal-day{min-height:44px}
  .cal-event{font-size:9px;padding:1px 3px}
  /* Tarefas 2 col */
  #tarefa-grid{grid-template-columns:1fr!important}
  /* Reforços */
  .metal-stats{flex-wrap:wrap;gap:10px}
}

/* ── Reforços ── */
.metal-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
.metal-header{padding:16px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.metal-info{display:flex;align-items:center;gap:12px}
.metal-circle{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0}
.metal-ouro .metal-circle{background:linear-gradient(135deg,#fde68a,#f59e0b);color:#78350f}
.metal-prata .metal-circle{background:linear-gradient(135deg,#e5e7eb,#9ca3af);color:#1f2937}
.metal-rodio .metal-circle{background:linear-gradient(135deg,#bfdbfe,#6366f1);color:#1e1b4b}
.metal-palladio .metal-circle{background:linear-gradient(135deg,#d1fae5,#34d399);color:#064e3b}
.metal-nome{font-weight:600;font-size:15px}
.metal-sim{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;letter-spacing:.5px}
.metal-stats{display:flex;gap:16px;padding:14px 18px;background:var(--bg3);border-bottom:1px solid var(--border)}
.metal-stat{text-align:center}
.metal-stat-val{font-size:18px;font-weight:700;font-family:'DM Mono',monospace}
.metal-stat-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.metal-log{padding:14px 18px;max-height:200px;overflow-y:auto}
.metal-log-item{display:flex;justify-content:space-between;align-items:flex-start;padding:8px 0;border-bottom:1px solid var(--border);gap:8px}
.metal-log-item:last-child{border-bottom:none}
.metal-log-main{font-size:13px;font-weight:500}
.metal-log-sub{font-size:11px;color:var(--text3);margin-top:2px}
.metal-log-qty{font-size:13px;font-weight:700;font-family:'DM Mono',monospace;color:var(--accent);white-space:nowrap}
.metal-add-form{padding:14px 18px;border-top:1px solid var(--border);display:none}
.metal-add-form.open{display:block}


.ev-item-tarefa{background:rgba(5,150,105,.06);border-color:var(--green)}
.ev-item-reforco{background:rgba(245,158,11,.08);border-color:#f59e0b}

async function sha256(str){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

let _pinPendingMetal=null;

async function authSubmit(){
  const val=document.getElementById('auth-input').value;
  const errEl=document.getElementById('auth-err');

  if(!val)return;
  if(await sha256(val)===_SH){
    sessionStorage.setItem('galv_session','1');
    document.getElementById('auth-overlay').style.display='none';
  } else {
    errEl.textContent='Senha incorreta.';
    document.getElementById('auth-input').value='';
    document.getElementById('auth-input').focus();
  }
}

async function pinSubmit(){
  const val=document.getElementById('pin-input').value;

  const paths=ICON_SVG[name]||'<circle cx="12" cy="12" r="5"/>';

  return `<span class="ti-icon"${st}><svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">${paths}</svg></span>`;

// ─── UTILS ───
const TURNOS=[{id:'manha',label:'Manhã',icon:'ti-sun'},{id:'tarde',label:'Tarde',icon:'ti-moon'}];
function today(){return new Date().toISOString().slice(0,10)}
function nowStr(){return new Date().toLocaleString('pt-BR')}
function load(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d}catch{return d}}
function save(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{}}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5)}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

const d=new Date();
document.getElementById('data-hoje').innerHTML=d.toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long'})+'<br><span style="font-size:10px">'+d.getFullYear()+'</span>';

const TABS=['tanques','processos','estoque','reforcos','calendario'];
function switchTab(t){
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',TABS[i]===t));
  document.querySelectorAll('.section').forEach(el=>el.classList.remove('active'));
  document.getElementById('sec-'+t).classList.add('active');
  if(t==='estoque')renderEstoque();
  if(t==='tanques')renderTanqueList();
  if(t==='processos')renderProcessos();
  if(t==='reforcos')renderReforcos();
  if(t==='calendario'){renderCalendario();renderTarefas();}
}

// ─── MODAL ───
function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(){document.querySelectorAll('.modal-bg').forEach(m=>m.classList.remove('open'));}
document.querySelectorAll('.modal-bg').forEach(m=>m.addEventListener('click',e=>{if(e.target===m)closeModal();}));

function openModalEdit(title, bodyHtml, onSave){
  document.getElementById('modal-edit-title').textContent=title;
  document.getElementById('modal-edit-body').innerHTML=bodyHtml;
  document.getElementById('modal-edit-ok').onclick=onSave;

// ─── TAREFAS ───
let tarefas_cfg=load('galv_tarefas',null);
if(!tarefas_cfg){
  const old=load('galv_checklists',null)||{};
  tarefas_cfg={
    manha:[...(old.chegada||[]),...(old.pre_almoco||[])],
    tarde:[...(old.pos_almoco||[]),...(old.final||[])]
  };
  save('galv_tarefas',tarefas_cfg);
}
let checks=load('galv_checks_'+today(),{});
function switchCalSub(sub){
  ['calendario','tarefas'].forEach(function(s){
    var el=document.getElementById('calpanel-'+s);
    var btn=document.getElementById('csub-'+s);
    if(el)el.style.display=(s===sub)?'block':'none';
    if(btn)btn.classList.toggle('active',s===sub);
  });
  if(sub==='calendario')renderCalendario();
  if(sub==='tarefas')renderTarefas();
}

function renderTarefas(){
  var lbl=document.getElementById('tarefa-data-label');
  if(lbl){var dt=new Date();lbl.textContent='Hoje, '+dt.toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long'});}
  var grid=document.getElementById('tarefa-grid');
  if(!grid)return;
  grid.innerHTML=TURNOS.map(function(turno){
    var items=(tarefas_cfg[turno.id]||[]).slice().sort(function(a,b){
      if(!a.hora&&!b.hora)return 0;if(!a.hora)return 1;if(!b.hora)return -1;return a.hora.localeCompare(b.hora);
    });
    var done=items.filter(function(it){return !!checks[turno.id+'_'+it.id];}).length;
    var iconColor=turno.id==='manha'?'#f59e0b':'#6366f1';
    var iconPath=turno.id==='manha'
      ?'<circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22"/><line x1="2" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="22" y2="12"/>'
      :'<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
    var iconSvg='<span class="ti-icon" style="color:'+iconColor+'"><svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">'+iconPath+'</svg></span>';
    var allDone=done===items.length&&items.length>0;
    return '<div class="card">'+
      '<div class="card-title" style="display:flex;align-items:center;gap:8px">'+iconSvg+turno.label+'<span class="pill'+(allDone?' done':'')+'">'+done+'/'+items.length+'</span></div>'+
      items.map(function(it){
        var c=!!checks[turno.id+'_'+it.id];
        var horaHtml=it.hora?'<span class="tarefa-hora">'+it.hora+'</span>':'';
        return '<div class="tarefa-item-row'+(c?' done':'')+'">'+
          '<input type="checkbox" id="c-'+turno.id+'-'+it.id+'" '+(c?'checked':'')+' onchange="toggleCheck(\'' + turno.id + '\',\'' + it.id + '\',this.checked)">'+
          '<label for="c-'+turno.id+'-'+it.id+'">'+horaHtml+esc(it.text)+'</label>'+
          '<button class="btn btn-ghost" onclick="delItem(\'' + turno.id + '\',\'' + it.id + '\')" title="Excluir" style="padding:2px 4px"><span class="ti-icon" style="width:12px;height:12px"><svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></span></button>'+
        '</div>';
      }).join('')+
      '<div class="add-tarefa-row">'+
        '<input type="time" id="hora-'+turno.id+'" placeholder="--:--">'+
        '<input type="text" id="new-'+turno.id+'" placeholder="Nova tarefa..." style="flex:1" onkeydown="if(event.key===&apos;Enter&apos;)addItem(\'' + turno.id + '\')">'+
        '<button class="btn btn-sm" onclick="addItem(\'' + turno.id + '\')"><span class="ti-icon"><svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></span></button>'+
      '</div>'+
    '</div>';
  }).join('');
}
function toggleCheck(turno,id,val){
  checks[turno+'_'+id]=val;
  save('galv_checks_'+today(),checks);
  if(val){
    // Registra tarefa concluída no calendário
    const item=tarefas_cfg[turno].find(x=>x.id===id);
    if(item){
      const titulo=item.text;
      const jaExiste=eventos.find(e=>e.data===today()&&e.tipo==='tarefa'&&e.ref===turno+'_'+id);
      if(!jaExiste){
        eventos.push({id:uid(),titulo,data:today(),tipo:'tarefa',ref:turno+'_'+id,turnoLabel:TURNOS.find(t=>t.id===turno)?.label||turno});
        save('galv_eventos',eventos);
      }
    }
  } else {
    // Desmarca: remove do calendário
    eventos=eventos.filter(e=>!(e.data===today()&&e.tipo==='tarefa'&&e.ref===turno+'_'+id));
    save('galv_eventos',eventos);
  }
  renderTarefas();
}
function addItem(turno){
  var inp=document.getElementById('new-'+turno);
  var text=inp.value.trim();if(!text)return;
  var horaEl=document.getElementById('hora-'+turno);
  var hora=horaEl?horaEl.value:'';
  tarefas_cfg[turno].push({id:uid(),text:text,hora:hora});
  save('galv_tarefas',tarefas_cfg);
  inp.value='';if(horaEl)horaEl.value='';
  renderTarefas();
}
function delItem(turno,id){if(!confirm('Excluir este item?'))return;tarefas_cfg[turno]=tarefas_cfg[turno].filter(it=>it.id!==id);delete checks[turno+'_'+id];save('galv_tarefas',tarefas_cfg);save('galv_checks_'+today(),checks);renderTarefas();}
function resetDia(){if(!confirm('Zerar marcações de hoje?'))return;checks={};save('galv_checks_'+today(),checks);renderTarefas();}
function editCheckItem(turno,id){
  const it=tarefas_cfg[turno].find(x=>x.id===id);
  openModalEdit('Editar item',
    `<div class="form-group"><label>Texto</label><input type="text" id="edit-check-txt" value="${esc(it.text)}"></div>`,
    ()=>{const v=document.getElementById('edit-check-txt').value.trim();if(!v)return;it.text=v;save('galv_tarefas',tarefas_cfg);renderTarefas();closeModal();}
  );
}

];let tanques=load('galv_tanques',null);
if(!tanques){
  tanques=TANQUES_INICIAIS.map(t=>({id:uid(),nome:t.nome,tipo:t.tipo,desc:t.desc||'',cor:t.cor||'#4f8fff',volume:0,componentes:[],montagem:{obs:'',passos:[]},params:PARAMS_PADRAO.map(p=>({id:uid(),nome:p.nome,unidade:p.unidade,min:p.min,max:p.max})),log:[]}));
  save('galv_tanques',tanques);
} else {
  // Migração: garante campos novos e insere tanques que ainda não existem
  tanques.forEach(t=>{
    if(!t.montagem)t.montagem={obs:'',passos:[]};
    if(!t.desc)t.desc='';
    if(!t.cor)t.cor='#4f8fff';
    if(!t.log)t.log=[];
    if(!t.componentes)t.componentes=[];
    if(!t.params)t.params=[];
    // Corrige tipo do Desengraxante/Vernizes que vieram como 'banho' em versões antigas
    const tipoCorreto=TANQUES_INICIAIS.find(x=>x.nome===t.nome);
    if(tipoCorreto){t.tipo=tipoCorreto.tipo;t.desc=t.desc||tipoCorreto.desc;t.cor=t.cor||tipoCorreto.cor;}
  });
  // Insere tanques do template que não existem ainda
  TANQUES_INICIAIS.forEach((tmpl,i)=>{
    if(!tanques.find(t=>t.nome===tmpl.nome)){
      tanques.splice(i,0,{id:uid(),nome:tmpl.nome,tipo:tmpl.tipo,desc:tmpl.desc||'',cor:tmpl.cor||'#4f8fff',volume:0,componentes:[],montagem:{obs:'',passos:[]},params:PARAMS_PADRAO.map(p=>({id:uid(),nome:p.nome,unidade:p.unidade,min:'',max:''})),log:[]});
    }
  });
  // Remove tanques obsoletos (Fosfato 890/900) que não estão mais no template
  // Remove tanques obsoletos que não estão no template atual
  const nomesValidos=TANQUES_INICIAIS.map(t=>t.nome);
  tanques=tanques.filter(t=>nomesValidos.includes(t.nome));
  save('galv_tanques',tanques);
}

let tanqueAtivo=null,innerTabAtivo={};

function toggleAddTanque(){document.getElementById('add-tanque-form').classList.toggle('open');}
function saveTanque(){
  const nome=document.getElementById('nt-nome').value.trim(),tipo=document.getElementById('nt-tipo').value,vol=parseFloat(document.getElementById('nt-vol').value)||0;
  if(!nome){alert('Informe o nome.');return;}
  tanques.push({id:uid(),nome,tipo,volume:vol,componentes:[],montagem:{obs:'',passos:[]},params:PARAMS_PADRAO.map(p=>({id:uid(),nome:p.nome,unidade:p.unidade,min:'',max:''})),log:[]});
  save('galv_tanques',tanques);
  document.getElementById('nt-nome').value='';document.getElementById('nt-vol').value='';
  document.getElementById('add-tanque-form').classList.remove('open');
  renderTanqueList();
}

function renderTanqueList(){
  const layout=document.getElementById('tanque-layout'),empty=document.getElementById('tanque-empty');
  if(!tanques.length){layout.style.display='none';empty.innerHTML='<div style="color:var(--text3);font-size:13px;padding:60px;text-align:center">Nenhum tanque cadastrado.</div>';return;}
  layout.style.display='grid';empty.innerHTML='';
  document.getElementById('tanque-list').innerHTML=tanques.map(t=>`
    <div class="tanque-row${tanqueAtivo===t.id?' active':''}" onclick="selectTanque('${t.id}')">
      <div style="display:flex;align-items:center;gap:9px;min-width:0">
        <span style="width:9px;height:9px;border-radius:50%;background:${t.cor||'var(--accent)'};flex-shrink:0;display:inline-block"></span>
        <div style="min-width:0"><div class="tanque-nome">${esc(t.nome)}</div></div>
      </div>
      <span class="ti-icon" style="width:13px;height:13px;flex-shrink:0;color:var(--text3)"><svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"><polyline points="9 18 15 12 9 6"/></svg></span>
    </div>`).join('');
  if(tanqueAtivo)renderTanqueDetail(tanqueAtivo);
  else document.getElementById('tanque-detail-area').innerHTML='<div style="color:var(--text3);font-size:13px;padding:40px 0;text-align:center">Selecione um tanque</div>';
}

function selectTanque(id){tanqueAtivo=id;if(!innerTabAtivo[id])innerTabAtivo[id]='composicoes';renderTanqueList();}
function getTanque(id){return tanques.find(t=>t.id===id);}
function switchInnerTab(tid,tab){innerTabAtivo[tid]=tab;renderTanqueDetail(tid);}

function renderTanqueDetail(id){
  const t=getTanque(id);if(!t)return;
  const tab=innerTabAtivo[id]||'composicoes';
  const tabs=[{id:'composicoes',label:'Composições',icon:'ti-flask'},{id:'montagem',label:'Montagem',icon:'ti-tools'},{id:'parametros',label:'Parâmetros',icon:'ti-adjustments-horizontal'},{id:'historico',label:'Histórico',icon:'ti-history'}];
  document.getElementById('tanque-detail-area').innerHTML=`
    <div class="card" style="padding:0;overflow:hidden">
      <div style="padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between">
        <div>
          <div style="font-size:17px;font-weight:600;color:var(--text)">${esc(t.nome)}</div>
          <div style="font-size:12px;color:var(--text3);font-family:'DM Mono',monospace;margin-top:2px">${t.tipo}${t.volume?' · '+t.volume+' L':''}</div>
        </div>
        <div style="display:flex;gap:6px">
          <button class="btn btn-edit btn-sm" onclick="editTanque('${t.id}')" title="Editar"><span class="ti-icon"><svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M4 20h4l10.5-10.5a2.828 2.828 0 1 0-4-4L4 16v4z"/><line x1="13.5" y1="6.5" x2="17.5" y2="10.5"/></svg></span></i></button>
          <button class="btn btn-ghost btn-sm" onclick="delTanque('${t.id}')" title="Excluir"><span class="ti-icon"><svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></span></i></button>
        </div>
      </div>
      <div class="inner-tabs">${tabs.map(tb=>`<button class="inner-tab${tab===tb.id?' active':''}" onclick="switchInnerTab('${id}','${tb.id}')">${svgIcon(tb.icon)}<span>${tb.label}</span></button>`).join('')}</div>
      <div>${renderInnerSection(t,tab)}</div>
    </div>`;
}

function editTanque(tid){
  const t=getTanque(tid);
  openModalEdit('Editar tanque',

function selTipo(id,tipo){

    document.getElementById('form-'+t+'-'+id).style.display=t===tipo?'block':'none';
    document.getElementById('tbtn-'+t+'-'+id).className='tipo-btn'+(t===tipo?' sel-'+t:'');
  });

function registrarEvento(id,tipo){
  const t=getTanque(id);let desc='';
  if(tipo==='rep'){
    const comp=document.getElementById('rc-'+id).value,qtd=document.getElementById('rq-'+id).value.trim(),unid=document.getElementById('ru-'+id).value.trim(),obs=document.getElementById('ro-'+id).value.trim();
    if(!comp||!qtd){alert('Selecione o componente e informe a quantidade.');return;}
    desc=`${comp} — ${qtd}${unid?' '+unid:''}${obs?' | '+obs:''}`;
    ['rq-'+id,'ru-'+id,'ro-'+id].forEach(x=>document.getElementById(x).value='');
  } else if(tipo==='troca'){
    const mot=document.getElementById('tmot-'+id).value.trim(),resp=document.getElementById('tresp-'+id).value.trim(),obs=document.getElementById('tobs-'+id).value.trim();
    desc=`${mot||'Troca completa'}${resp?' — Resp: '+resp:''}${obs?' | '+obs:''}`;
    ['tmot-'+id,'tresp-'+id,'tobs-'+id].forEach(x=>document.getElementById(x).value='');
  } else {
    const ft=document.getElementById('ftipo-'+id).value,dur=document.getElementById('fdur-'+id).value.trim(),resp=document.getElementById('fresp-'+id).value.trim(),obs=document.getElementById('fobs-'+id).value.trim();
    desc=`${ft}${dur?' · '+dur+'h':''}${resp?' — Resp: '+resp:''}${obs?' | '+obs:''}`;
    ['fdur-'+id,'fresp-'+id,'fobs-'+id].forEach(x=>document.getElementById(x).value='');
  }
  const tipoStr=tipo==='rep'?'reposicao':tipo==='troca'?'troca':'filtragem';
  t.log.push({id:uid(),tipo:tipoStr,descricao:desc,ts:nowStr(),data:today(),tanqueNome:t.nome});
  save('galv_tanques',tanques);renderTanqueDetail(id);switchInnerTab(id,'historico');
}

function nivelCor(qty,min){
  if(!min||min<=0)return'nok';
  const r=qty/min;
  if(r>2)return'nok';
  if(r>1)return'nmed';
  return'nlow';
}
function badgeCor(qty,min){
  if(!min||min<=0)return'badge-ok';
  const r=qty/min;
  if(r>2)return'badge-ok';
  if(r>1)return'badge-med';
  return'badge-low';
}
function badgeLabel(qty,min){
  if(!min||min<=0)return'OK';
  const r=qty/min;
  if(r>2)return'OK';
  if(r>1)return'Médio';
  return'Baixo';
}

  const filtTipo=document.getElementById('filtro-tipo').value;

  // Populate banho filter
  const banhos=[...new Set(estoque.map(e=>e.banho))].sort();
  const sel=document.getElementById('filtro-nome');
  const cur=sel.value;
  sel.innerHTML='<option value="todos">Todos os banhos/processos</option>'+banhos.map(b=>`<option value="${esc(b)}"${cur===b?' selected':''}>${esc(b)}</option>`).join('');

  const lista=estoque.filter(e=>{
    if(filtTipo!=='todos'&&e.tipo!==filtTipo)return false;
    if(filtNome!=='todos'&&e.banho!==filtNome)return false;
    return true;
  });

  const tbody=document.getElementById('stock-body');
  if(!lista.length){tbody.innerHTML='<tr><td colspan="7" class="empty-msg">Nenhum produto encontrado.</td></tr>';return;}

  tbody.innerHTML=lista.map(e=>{
    const nc=nivelCor(e.qty,e.min);
    const bc=badgeCor(e.qty,e.min);
    const bl=badgeLabel(e.qty,e.min);
    const pct=e.min>0?Math.min(100,Math.round((e.qty/e.min)*50)):100;
    return`<tr>
      <td class="bold">${esc(e.nome)}</td>
      <td><span class="badge ${e.tipo==='banho'?'badge-banho':'badge-processo'}">${e.tipo==='banho'?'Banho':'Processo'}</span></td>
      <td style="color:var(--text3);font-size:12px">${esc(e.banho)}</td>
      <td class="accent">
        <div class="qty-cell">
          <button class="qty-btn" onclick="changeQty('${e.id}',-1)">−</button>
          <span style="min-width:40px;text-align:center">${e.qty}</span>
          <button class="qty-btn" onclick="changeQty('${e.id}',1)">+</button>
        </div>
      </td>
      <td style="color:var(--text3)">${esc(e.unidade)}</td>
      <td>
        <div style="display:flex;align-items:center;gap:6px">
          <div class="nivel-bar"><div class="nivel-fill ${nc}" style="width:${pct}%"></div></div>
          <span class="badge ${bc}">${bl}</span>
        </div>
      </td>
      <td class="act-col">
        <div class="act-btns">
          <button class="btn btn-edit" onclick="editProduto('${e.id}')"><span class="ti-icon" style="width:12px;height:12px"><svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M4 20h4l10.5-10.5a2.828 2.828 0 1 0-4-4L4 16v4z"/><line x1="13.5" y1="6.5" x2="17.5" y2="10.5"/></svg></span></i></button>
          <button class="btn btn-ghost" onclick="delProduto('${e.id}')" title="Excluir"><span class="ti-icon" style="width:12px;height:12px"><svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></span></i></button>
        </div>
      </td>
    </tr>`;
  }).join('');
}


// ─── REFORÇOS ───
const METAIS=[
  {id:'ouro',  nome:'Ouro',    sim:'Au', cls:'metal-ouro',    cor:'#f59e0b'},
  {id:'prata', nome:'Prata',   sim:'Ag', cls:'metal-prata',   cor:'#6b7280'},
  {id:'rodio', nome:'Ródio',   sim:'Rh', cls:'metal-rodio',   cor:'#6366f1'},
  {id:'palladio',nome:'Paládio',sim:'Pd',cls:'metal-palladio',cor:'#10b981'},
];

let reforcos=load('galv_reforcos',[]);

function toggleMetalForm(metalId){
  document.getElementById('mf-'+metalId).classList.toggle('open');
}
function addReforco(metalId){
  const qty=parseFloat(document.getElementById('mf-qty-'+metalId).value)||0;
  const custo=0;
  const obs=document.getElementById('mf-obs-'+metalId).value.trim();
  const data=document.getElementById('mf-data-'+metalId).value||today();
  if(!qty){alert('Informe a quantidade.');return;}
  const metal=METAIS.find(m=>m.id===metalId);
  reforcos.push({id:uid(),metal:metalId,metalNome:metal.nome,qty,unidade:'g',custo,obs,data});
  save('galv_reforcos',reforcos);
  // Registra no calendário automaticamente
  eventos.push({id:uid(),titulo:`Reforço de ${metal.nome} — ${qty}g`,data,tipo:'reforco',metal:metalId});
  save('galv_eventos',eventos);
  // Limpa form
  ['mf-qty-','mf-obs-'].forEach(p=>{const el=document.getElementById(p+metalId);if(el)el.value='';}); 
  document.getElementById('mf-'+metalId).classList.remove('open');
  renderReforcos();
}
function delReforco(id){
  if(!confirm('Excluir este reforço?'))return;
  const r=reforcos.find(x=>x.id===id);
  if(r){eventos=eventos.filter(e=>!(e.tipo==='reforco'&&e.metal===r.metal&&e.data===r.data));}
  reforcos=reforcos.filter(x=>x.id!==id);
  save('galv_reforcos',reforcos);renderReforcos();
}

function renderReforcos(){
  const grid=document.getElementById('reforcos-grid');
  const mesAtual=new Date().toISOString().slice(0,7);
  grid.innerHTML=METAIS.map(m=>{
    const hist=reforcos.filter(r=>r.metal===m.id).sort((a,b)=>b.data.localeCompare(a.data));
    const totalMes=hist.filter(r=>r.data.startsWith(mesAtual)).reduce((s,r)=>s+r.qty,0);
    const totalGeral=hist.reduce((s,r)=>s+r.qty,0);
    const ultimo=hist[0];
    return `<div class="metal-card ${m.cls}">
      <div class="metal-header">
        <div class="metal-info">
          <div class="metal-circle">${m.sim}</div>
          <div>
            <div class="metal-nome">${m.nome}</div>
            <div class="metal-sim">${ultimo?'Último: '+ultimo.data.split('-').reverse().join('/'):'Sem reforços'}</div>
          </div>
        </div>
        <button class="btn btn-sm btn-primary" onclick="openPinOverlay('${m.id}')">
          <span class="ti-icon"><svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></span>Reforço
        </button>
      </div>
      <div class="metal-stats">
        <div class="metal-stat"><div class="metal-stat-val">${totalGeral.toFixed(1)}g</div><div class="metal-stat-label">Total geral</div></div>
        <div class="metal-stat"><div class="metal-stat-val">${totalMes.toFixed(1)}g</div><div class="metal-stat-label">Este mês</div></div>

      </div>
      <div class="metal-add-form" id="mf-${m.id}">
        <div class="form-grid-2" style="margin-bottom:10px">
          <div class="form-group"><label>Quantidade (g)</label><input type="number" id="mf-qty-${m.id}" placeholder="ex: 0.5" step="0.01" min="0"></div>

        </div>
        <div class="form-grid-2" style="margin-bottom:10px">
          <div class="form-group"><label>Data</label><input type="date" id="mf-data-${m.id}" value="${today()}"></div>
          <div class="form-group"><label>Obs</label><input type="text" id="mf-obs-${m.id}" placeholder="Observação"></div>
        </div>
        <div style="display:flex;gap:8px;justify-content:flex-end">
          <button class="btn btn-sm" onclick="toggleMetalForm('${m.id}')">Cancelar</button>
          <button class="btn btn-sm btn-primary" onclick="addReforco('${m.id}')">Salvar</button>
        </div>
      </div>
      <div class="metal-log">${hist.length===0?'<p class="empty-msg">Nenhum reforço registrado.</p>':hist.map(r=>`
        <div class="metal-log-item">
          <div>
            <div class="metal-log-main">${r.data.split('-').reverse().join('/')}${r.obs?' — <span style="color:var(--text3);font-weight:400">'+esc(r.obs)+'</span>':''}</div>
            ${r.custo?`<div class="metal-log-sub">R$ ${r.custo.toFixed(2)}</div>`:''}
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            <div class="metal-log-qty">+${r.qty}g</div>
            <button class="btn btn-ghost" onclick="delReforco('${r.id}')" title="Excluir" style="padding:2px 4px"><span class="ti-icon" style="width:13px;height:13px"><svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></span></button>
          </div>
        </div>`).join('')}
      </div>
    </div>`;
  }).join('');
}

// ─── CALENDÁRIO ───
let eventos=load('galv_eventos',[]);
let calAno=new Date().getFullYear();
let calMes=new Date().getMonth();
let calDiaSel=today();

const MESES=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const DIAS_SEMANA=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];

function calNav(dir){calMes+=dir;if(calMes>11){calMes=0;calAno++;}if(calMes<0){calMes=11;calAno--;}renderCalendario();}
function calGoToday(){calAno=new Date().getFullYear();calMes=new Date().getMonth();calDiaSel=today();renderCalendario();}

function openModalEvento(){
  // populate tanque select
  const sel=document.getElementById('ev-tanque');
  sel.innerHTML='<option value="">Nenhum</option>'+tanques.map(t=>`<option value="${esc(t.nome)}">${esc(t.nome)}</option>`).join('');
  document.getElementById('ev-data').value=calDiaSel;
  document.getElementById('ev-titulo').value='';
  document.getElementById('ev-obs').value='';
  openModal('modal-evento');
}

function salvarEvento(){
  const titulo=document.getElementById('ev-titulo').value.trim();
  const data=document.getElementById('ev-data').value;
  if(!titulo||!data){alert('Informe título e data.');return;}
  eventos.push({
    id:uid(),titulo,data,
    tanque:document.getElementById('ev-tanque').value,
    tipo:document.getElementById('ev-tipo').value,
    obs:document.getElementById('ev-obs').value.trim()
  });
  save('galv_eventos',eventos);closeModal();renderCalendario();
}

function delEvento(id){
  if(!confirm('Excluir evento?'))return;
  eventos=eventos.filter(e=>e.id!==id);
  save('galv_eventos',eventos);renderCalendario();
}

function selectCalDay(dateStr){
  calDiaSel=dateStr;
  renderCalendario();
}

function renderCalSide(dateStr){
  const sideTitle=document.getElementById('cal-side-title');
  const sideBody=document.getElementById('cal-side-body');
  const dt=new Date(dateStr+'T00:00:00');
  sideTitle.textContent='Eventos — '+dt.toLocaleDateString('pt-BR',{day:'2-digit',month:'long'});

  // Eventos do dia + do mês atual
  const evDia=eventos.filter(e=>e.data===dateStr);

  // Também mostra todos do mês no painel lateral quando nada selecionado
  const evMes=eventos.filter(e=>{
    const [ay,am]=e.data.split('-');
    return +ay===calAno&&+am-1===calMes;
  }).sort((a,b)=>a.data.localeCompare(b.data));

  const lista=evDia.length?evDia:evMes;
  if(!lista.length){sideBody.innerHTML='<p class="empty-msg">Sem eventos '+( evDia.length===0&&evMes.length===0?'neste mês':'neste dia')+'.</p>';return;}

  sideBody.innerHTML=lista.map(e=>{
    const cls=e.tipo==='vencimento'?'ev-item-venc':e.tipo==='tarefa'?'ev-item-tarefa':e.tipo==='reforco'?'ev-item-reforco':'ev-item-agenda';
    const now=today();
    let vencBadge='';
    if(e.tipo==='vencimento'){
      if(e.data<now)vencBadge='<span class="venc-badge">Vencido</span>';
      else if(e.data===now)vencBadge='<span class="venc-badge warn">Hoje</span>';
      else{
        const dias=Math.ceil((new Date(e.data+'T00:00:00')-new Date(now+'T00:00:00'))/(864e5));
        vencBadge=`<span class="venc-badge ok">+${dias}d</span>`;
      }
    }
    return`<div class="ev-item ${cls}">
      <div class="ev-title">${esc(e.titulo)}${vencBadge}</div>
      <div class="ev-sub">${e.data.split('-').reverse().join('/')}${e.tanque?' · '+esc(e.tanque):''}</div>
      ${e.obs?`<div class="ev-desc">${esc(e.obs)}</div>`:''}
      <div style="margin-top:6px"><button class="btn btn-ghost btn-sm" onclick="delEvento('${e.id}')" title="Excluir"><span class="ti-icon" style="width:11px;height:11px"><svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></span></i></button></div>
    </div>`;
  }).join('');
}

function renderCalendario(){
  document.getElementById('cal-title').textContent=MESES[calMes]+' '+calAno;

  const grid=document.getElementById('cal-grid');
  // Cabeçalho dias semana
  let html=DIAS_SEMANA.map(d=>`<div class="cal-dow">${d}</div>`).join('');

  const primeiro=new Date(calAno,calMes,1);
  const ultimo=new Date(calAno,calMes+1,0);
  const startDow=primeiro.getDay(); // 0=dom
  const todayStr=today();

  // Células do calendário
  const totalCelulas=Math.ceil((startDow+ultimo.getDate())/7)*7;
  for(let i=0;i<totalCelulas;i++){
    const dayOffset=i-startDow;
    const dt=new Date(calAno,calMes,1+dayOffset);
    const dtStr=dt.toISOString().slice(0,10);
    const isOther=dt.getMonth()!==calMes;
    const isToday=dtStr===todayStr;
    const isSel=dtStr===calDiaSel;

    // Eventos deste dia
    const evDia=eventos.filter(e=>e.data===dtStr);

    // Eventos de tanques (log) – histórico do dia
    const evHist=tanques.flatMap(t=>(t.log||[]).filter(l=>l.data&&l.data.startsWith(dtStr)).map(l=>({...l,tanqueNome:t.nome})));

    let cls='cal-day';
    if(isOther)cls+=' other-month';
    if(isToday)cls+=' today';
    if(isSel&&!isToday)cls+=' selected';

    let evHtml=evDia.map(e=>{
      const ec=e.tipo==='vencimento'?'cal-event-venc':e.tipo==='tarefa'?'cal-event-tarefa':e.tipo==='reforco'?'cal-event-reforco':'cal-event-agenda';
      return`<div class="cal-event ${ec}" onclick="event.stopPropagation();selectCalDay('${dtStr}')" title="${esc(e.titulo)}">${esc(e.titulo)}</div>`;
    }).join('');

    if(evHist.length){evHtml+=`<div class="cal-event cal-event-hist" title="Histórico tanque">${evHist.length} reg. tanque</div>`;}

    html+=`<div class="${cls}" onclick="selectCalDay('${dtStr}')">
      <div class="cal-day-num">${dt.getDate()}</div>
      ${evHtml}
    </div>`;
  }
  grid.innerHTML=html;

  renderCalSide(calDiaSel);
}

// ─── INIT ───
renderReforcos();
switchTab('tanques');

</script>
